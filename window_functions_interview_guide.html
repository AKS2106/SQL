</div>

<script>
const data = [
{
  id:"concept", label:"Core Concept",
  title:"What is a window function — really",
  sub:"Before memorizing syntax, understand the one idea that unlocks all window functions.",
  cards:[
    {
      title:"GROUP BY vs window function — the key difference", badge:"Foundation", bc:"b-blue",
      body:`
<div class="lbl">GROUP BY collapses rows. Window functions don't.</div>
<div class="para">That's the entire difference. Everything else follows from this.</div>
<div class="diff-grid">
  <div class="diff-box">
    <div class="diff-title">GROUP BY</div>
    <div class="diff-text">5 rows → 2 rows<br>Original rows gone<br>Can't see individual data</div>
  </div>
  <div class="diff-box">
    <div class="diff-title">Window function</div>
    <div class="diff-text">5 rows → 5 rows<br>Original rows kept<br>Adds a new column</div>
  </div>
  <div class="diff-box">
    <div class="diff-title">When to use which</div>
    <div class="diff-text">GROUP BY = summary<br>Window = compare each row to its group</div>
  </div>
</div>
<div class="lbl">Same data, different results</div>
<div class="table-wrap">
<table>
<tr><th>name</th><th>dept</th><th>salary</th><th>GROUP BY avg</th><th>Window avg</th></tr>
<tr><td>Alice</td><td>IT</td><td>70000</td><td rowspan="2" style="text-align:center;vertical-align:middle">IT: 75000<br>HR: 55000</td><td>75000</td></tr>
<tr><td>Bob</td><td>IT</td><td>80000</td><td>75000</td></tr>
<tr><td>Carol</td><td>HR</td><td>50000</td><td rowspan="2" style="text-align:center;vertical-align:middle"></td><td>55000</td></tr>
<tr><td>Dave</td><td>HR</td><td>60000</td><td>55000</td></tr>
</table>
</div>
<div class="insight">With GROUP BY you lose Alice, Bob, Carol, Dave. With window function every employee row stays — plus you get the dept average added. That's the power.</div>`
    },
    {
      title:"Anatomy of OVER() — the three parts", badge:"Syntax", bc:"b-blue",
      body:`
<div class="lbl">Every window function has the same structure</div>
<div class="code">FUNCTION_NAME() OVER (
  PARTITION BY column   -- reset for each group  (optional)
  ORDER BY column       -- defines sequence       (optional)
  ROWS BETWEEN ...      -- defines frame          (optional)
)</div>
<div class="lbl">What each part means</div>
<div class="think">
  <div class="think-row"><span class="think-q">PARTITION BY</span><span class="think-a">Like GROUP BY but without collapsing. "Do this calculation separately for each dept." If missing → treats whole table as one group.</span></div>
  <div class="think-row"><span class="think-q">ORDER BY</span><span class="think-a">Defines order within each partition. Required for ranking, LAG/LEAD, running totals. Meaningless for AVG/SUM without a frame.</span></div>
  <div class="think-row"><span class="think-q">ROWS BETWEEN</span><span class="think-a">Defines which rows to include in the calculation. Default is "all rows in partition". For running total: UNBOUNDED PRECEDING to CURRENT ROW.</span></div>
</div>
<div class="lbl">PySpark equivalent</div>
<div class="code">from pyspark.sql.window import Window

w = Window.partitionBy("dept") \   # PARTITION BY
          .orderBy("salary") \     # ORDER BY
          .rowsBetween(            # ROWS BETWEEN
              Window.unboundedPreceding,
              Window.currentRow
          )</div>
<div class="tip">In interviews say: "PARTITION BY is like GROUP BY for window functions — it restarts the calculation for each group but keeps all rows."</div>`
    }
  ]
},
{
  id:"ranking", label:"Ranking Functions",
  title:"Ranking functions — ROW_NUMBER, RANK, DENSE_RANK",
  sub:"The most asked window function topic. Know the difference between all three — interviewers always test this.",
  cards:[
    {
      title:"ROW_NUMBER vs RANK vs DENSE_RANK — the difference", badge:"Must Know", bc:"b-red",
      body:`
<div class="lbl">Same data, three different results — memorize this table</div>
<div class="table-wrap">
<table>
<tr><th>name</th><th>salary</th><th>ROW_NUMBER</th><th>RANK</th><th>DENSE_RANK</th></tr>
<tr><td>Alice</td><td>90000</td><td>1</td><td>1</td><td>1</td></tr>
<tr><td>Bob</td><td>75000</td><td>2</td><td>2</td><td>2</td></tr>
<tr class="hl"><td>Carol</td><td>75000</td><td>3</td><td>2</td><td>2</td></tr>
<tr><td>Dave</td><td>60000</td><td>4</td><td>4</td><td>3</td></tr>
<tr><td>Eve</td><td>50000</td><td>5</td><td>5</td><td>4</td></tr>
</table>
</div>
<div class="think">
  <div class="think-row"><span class="think-q">ROW_NUMBER</span><span class="think-a">Always unique. No ties. Even if Bob and Carol have same salary → 2 and 3. Use for deduplication.</span></div>
  <div class="think-row"><span class="think-q">RANK</span><span class="think-a">Ties get same rank. But next rank skips. Bob=2, Carol=2, Dave=4 (gap). Use rarely.</span></div>
  <div class="think-row"><span class="think-q">DENSE_RANK</span><span class="think-a">Ties get same rank. No gaps. Bob=2, Carol=2, Dave=3. Use for Nth highest salary.</span></div>
</div>
<div class="tip">Rule: Use ROW_NUMBER for deduplication. Use DENSE_RANK for Nth highest / top N per group. Avoid RANK in interviews unless specifically asked.</div>
<div class="code">SELECT name, salary,
  ROW_NUMBER()  OVER (ORDER BY salary DESC) AS row_num,
  RANK()        OVER (ORDER BY salary DESC) AS rnk,
  DENSE_RANK()  OVER (ORDER BY salary DESC) AS dense_rnk
FROM employees;</div>`
    },
    {
      title:"Q: Find the 2nd highest salary in each department", badge:"Top Interview Q", bc:"b-red",
      body:`
<div class="lbl">Break it down first</div>
<div class="think">
  <div class="think-row"><span class="think-q">Per dept?</span><span class="think-a">Yes → PARTITION BY dept</span></div>
  <div class="think-row"><span class="think-q">Ranking?</span><span class="think-a">2nd highest → DENSE_RANK (handles ties correctly)</span></div>
  <div class="think-row"><span class="think-q">Filter?</span><span class="think-a">Can't filter on window function in WHERE → wrap in CTE first</span></div>
</div>
<div class="lbl">SQL</div>
<div class="code">WITH ranked AS (
  SELECT name, dept, salary,
    DENSE_RANK() OVER (
      PARTITION BY dept
      ORDER BY salary DESC
    ) AS rnk
  FROM employees
)
SELECT name, dept, salary
FROM ranked
WHERE rnk = 2;</div>
<div class="lbl">PySpark</div>
<div class="code">from pyspark.sql.window import Window
from pyspark.sql.functions import dense_rank

w = Window.partitionBy("dept").orderBy(col("salary").desc())

df.withColumn("rnk", dense_rank().over(w)) \
  .filter(col("rnk") == 2) \
  .select("name","dept","salary")</div>
<div class="insight">This is the most asked window function question in interviews. The pattern is always: rank in CTE → filter outside. Never try to filter a window function in the same SELECT.</div>`
    },
    {
      title:"Q: Top N per group — top 3 employees per department", badge:"Classic", bc:"b-amber",
      body:`
<div class="lbl">Exact same pattern — just change the filter number</div>
<div class="code">WITH ranked AS (
  SELECT name, dept, salary,
    DENSE_RANK() OVER (
      PARTITION BY dept ORDER BY salary DESC
    ) AS rnk
  FROM employees
)
SELECT name, dept, salary, rnk
FROM ranked
WHERE rnk <= 3;   -- change this number for top N</div>
<div class="lbl">PySpark</div>
<div class="code">w = Window.partitionBy("dept").orderBy(col("salary").desc())
df.withColumn("rnk", dense_rank().over(w)) \
  .filter(col("rnk") <= 3)</div>
<div class="lbl">Variations you will see</div>
<div class="think">
  <div class="think-row"><span class="think-q">Top 1 per group</span><span class="think-a">WHERE rnk = 1 → gives highest salary per dept</span></div>
  <div class="think-row"><span class="think-q">Bottom N</span><span class="think-a">Change ORDER BY salary ASC → now rank 1 = lowest</span></div>
  <div class="think-row"><span class="think-q">Latest per user</span><span class="think-a">PARTITION BY user_id ORDER BY date DESC → rnk = 1 is most recent</span></div>
  <div class="think-row"><span class="think-q">Dedup keep first</span><span class="think-a">ROW_NUMBER + PARTITION BY name ORDER BY id → keep rn = 1</span></div>
</div>`
    },
    {
      title:"Q: Remove duplicates keeping lowest ID", badge:"Dedup Pattern", bc:"b-purple",
      body:`
<div class="lbl">When to use ROW_NUMBER instead of DENSE_RANK</div>
<div class="para">Deduplication = you want exactly ONE row per group, no ties. ROW_NUMBER guarantees uniqueness even when values are identical.</div>
<div class="code">WITH dupes AS (
  SELECT *,
    ROW_NUMBER() OVER (
      PARTITION BY name, email   -- columns that define a duplicate
      ORDER BY id ASC            -- keep lowest id
    ) AS rn
  FROM employees
)
SELECT * FROM dupes
WHERE rn = 1;   -- keep only the first occurrence</div>
<div class="lbl">PySpark</div>
<div class="code">w = Window.partitionBy("name","email").orderBy("id")
df.withColumn("rn", row_number().over(w)) \
  .filter(col("rn") == 1) \
  .drop("rn")</div>
<div class="tip">Interview tip: When asked "how do you remove duplicates in PySpark?" — mention both dropDuplicates() for simple cases AND the ROW_NUMBER approach when you need to control which row to keep.</div>`
    }
  ]
},
{
  id:"lag_lead", label:"LAG & LEAD",
  title:"LAG and LEAD — compare with previous or next row",
  sub:"LAG looks back. LEAD looks forward. Used for day-over-day changes, finding gaps, comparing to previous record.",
  cards:[
    {
      title:"LAG and LEAD — the concept", badge:"Concept", bc:"b-blue",
      body:`
<div class="lbl">Think of it as sliding the column up or down</div>
<div class="table-wrap">
<table>
<tr><th>date</th><th>revenue</th><th>LAG(revenue)</th><th>LEAD(revenue)</th></tr>
<tr><td>Jan 1</td><td>100</td><td>NULL</td><td>150</td></tr>
<tr class="hl"><td>Jan 2</td><td>150</td><td>100</td><td>120</td></tr>
<tr><td>Jan 3</td><td>120</td><td>150</td><td>200</td></tr>
<tr><td>Jan 4</td><td>200</td><td>120</td><td>NULL</td></tr>
</table>
</div>
<div class="think">
  <div class="think-row"><span class="think-q">LAG(col, N)</span><span class="think-a">Brings value from N rows BEFORE current row. Default N=1. First row gets NULL.</span></div>
  <div class="think-row"><span class="think-q">LEAD(col, N)</span><span class="think-a">Brings value from N rows AFTER current row. Default N=1. Last row gets NULL.</span></div>
  <div class="think-row"><span class="think-q">Default value</span><span class="think-a">LAG(col, 1, 0) → use 0 instead of NULL for missing rows. Useful for running calculations.</span></div>
</div>
<div class="code">SELECT date, revenue,
  LAG(revenue)  OVER (ORDER BY date) AS prev_revenue,
  LEAD(revenue) OVER (ORDER BY date) AS next_revenue,
  revenue - LAG(revenue) OVER (ORDER BY date) AS daily_change
FROM sales;</div>`
    },
    {
      title:"Q: Day-over-day and month-over-month change", badge:"Classic", bc:"b-green",
      body:`
<div class="lbl">Day-over-day revenue change</div>
<div class="code">SELECT date, revenue,
  LAG(revenue) OVER (ORDER BY date) AS prev_day,
  revenue - LAG(revenue) OVER (ORDER BY date) AS change,
  ROUND(100.0 * (revenue - LAG(revenue) OVER (ORDER BY date))
        / LAG(revenue) OVER (ORDER BY date), 1) AS pct_change
FROM daily_sales
ORDER BY date;</div>
<div class="lbl">Month-over-month per product category</div>
<div class="code">WITH monthly AS (
  SELECT category,
    DATE_FORMAT(sale_date,'%Y-%m') AS month,
    SUM(revenue) AS total
  FROM sales
  GROUP BY category, DATE_FORMAT(sale_date,'%Y-%m')
)
SELECT category, month, total,
  LAG(total) OVER (
    PARTITION BY category   -- reset per category
    ORDER BY month
  ) AS prev_month,
  ROUND(100.0*(total - LAG(total) OVER (
    PARTITION BY category ORDER BY month)
  ) / LAG(total) OVER (
    PARTITION BY category ORDER BY month), 1) AS mom_pct
FROM monthly;</div>
<div class="lbl">PySpark</div>
<div class="code">from pyspark.sql.functions import lag, round as round_
w = Window.partitionBy("category").orderBy("month")

df.withColumn("prev", lag("total").over(w)) \
  .withColumn("mom_pct",
    round_(100*(col("total")-col("prev"))/col("prev"), 1))</div>`
    },
    {
      title:"Q: Find gaps in a sequence using LEAD", badge:"Gap Detection", bc:"b-amber",
      body:`
<div class="lbl">Find missing order IDs or missing dates</div>
<div class="code">-- Find gaps in order_id sequence
SELECT order_id,
  LEAD(order_id) OVER (ORDER BY order_id) AS next_id,
  LEAD(order_id) OVER (ORDER BY order_id) - order_id - 1 AS gap_size
FROM orders
HAVING gap_size > 0;  -- only show rows where gap exists</div>
<div class="lbl">Find users who stopped ordering (gap between orders > 30 days)</div>
<div class="code">SELECT user_id, order_date,
  LEAD(order_date) OVER (
    PARTITION BY user_id ORDER BY order_date
  ) AS next_order,
  DATEDIFF(
    LEAD(order_date) OVER (PARTITION BY user_id ORDER BY order_date),
    order_date
  ) AS days_to_next
FROM orders
HAVING days_to_next > 30 OR days_to_next IS NULL;</div>
<div class="tip">NULL in LEAD = no next order = this was the user's last order. Filter IS NULL to find users who never ordered again.</div>`
    },
    {
      title:"Q: Compare each employee salary to their manager", badge:"Self-Join + LAG", bc:"b-purple",
      body:`
<div class="lbl">Two approaches — know both</div>
<div class="lbl">Approach 1: Self-join (clearer)</div>
<div class="code">SELECT e.name, e.salary,
  m.name AS manager_name, m.salary AS manager_salary,
  e.salary - m.salary AS diff
FROM employees e
LEFT JOIN employees m ON e.manager_id = m.emp_id;</div>
<div class="lbl">Approach 2: LAG (if data is ordered by hierarchy)</div>
<div class="code">SELECT emp_id, name, salary, manager_id,
  LAG(salary) OVER (
    PARTITION BY manager_id ORDER BY emp_id
  ) AS prev_peer_salary,
  salary - LAG(salary) OVER (
    PARTITION BY manager_id ORDER BY emp_id
  ) AS diff_from_prev_peer
FROM employees;</div>
<div class="insight">In interviews, always go with self-join for manager comparison — it's clearer and more correct. Only mention LAG if they specifically ask for a window function approach.</div>`
    }
  ]
},
{
  id:"running", label:"Running Calculations",
  title:"Running totals, moving averages, cumulative sums",
  sub:"The ROWS BETWEEN clause is what makes these work. Understand the frame and you can build any running calculation.",
  cards:[
    {
      title:"ROWS BETWEEN — the frame concept", badge:"Key Concept", bc:"b-blue",
      body:`
<div class="lbl">Think of it as a sliding window over rows</div>
<div class="think">
  <div class="think-row"><span class="think-q">UNBOUNDED PRECEDING</span><span class="think-a">From the very first row of the partition</span></div>
  <div class="think-row"><span class="think-q">CURRENT ROW</span><span class="think-a">Up to and including the current row</span></div>
  <div class="think-row"><span class="think-q">N PRECEDING</span><span class="think-a">N rows before current row</span></div>
  <div class="think-row"><span class="think-q">N FOLLOWING</span><span class="think-a">N rows after current row</span></div>
</div>
<div class="lbl">Common frames and what they do</div>
<div class="code">-- Running total (all rows from start to current)
ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

-- Moving average of last 7 rows
ROWS BETWEEN 6 PRECEDING AND CURRENT ROW

-- Entire partition (same as no frame — for avg over whole group)
ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING</div>
<div class="table-wrap">
<table>
<tr><th>date</th><th>sales</th><th>running total</th><th>3-day moving avg</th></tr>
<tr><td>Jan 1</td><td>100</td><td>100</td><td>100</td></tr>
<tr><td>Jan 2</td><td>150</td><td>250</td><td>125</td></tr>
<tr class="hl"><td>Jan 3</td><td>120</td><td>370</td><td>123</td></tr>
<tr><td>Jan 4</td><td>200</td><td>570</td><td>157</td></tr>
</table>
</div>`
    },
    {
      title:"Q: Running total of sales ordered by date", badge:"Running Total", bc:"b-green",
      body:`
<div class="lbl">SQL</div>
<div class="code">SELECT date, sales,
  SUM(sales) OVER (
    ORDER BY date
    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
  ) AS running_total
FROM daily_sales;</div>
<div class="lbl">PySpark</div>
<div class="code">from pyspark.sql.functions import sum as sum_
from pyspark.sql.window import Window

w = Window.orderBy("date") \
    .rowsBetween(Window.unboundedPreceding, Window.currentRow)

df.withColumn("running_total", sum_("sales").over(w))</div>
<div class="lbl">Running total per department (reset per group)</div>
<div class="code">-- Add PARTITION BY to reset total for each dept
SELECT name, dept, salary,
  SUM(salary) OVER (
    PARTITION BY dept
    ORDER BY emp_id
    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
  ) AS dept_running_total
FROM employees;</div>
<div class="tip">Always specify ROWS BETWEEN explicitly in PySpark. Without it, the default frame is RANGE BETWEEN which can give unexpected results with duplicate values.</div>`
    },
    {
      title:"Q: 7-day moving average of revenue", badge:"Moving Average", bc:"b-green",
      body:`
<div class="lbl">SQL — 7 rows including current = 6 PRECEDING to CURRENT ROW</div>
<div class="code">SELECT date, revenue,
  ROUND(AVG(revenue) OVER (
    ORDER BY date
    ROWS BETWEEN 6 PRECEDING AND CURRENT ROW
  ), 2) AS moving_avg_7d
FROM daily_revenue;</div>
<div class="lbl">PySpark</div>
<div class="code">w = Window.orderBy("date").rowsBetween(-6, 0)
df.withColumn("moving_avg_7d",
    round_(avg("revenue").over(w), 2))</div>
<div class="lbl">Variation — 30 day moving average per product category</div>
<div class="code">w = Window.partitionBy("category") \
          .orderBy("date") \
          .rowsBetween(-29, 0)  # 30 rows including current

df.withColumn("moving_avg_30d", avg("revenue").over(w))</div>
<div class="insight">Moving average smooths out spikes in data — tell the interviewer this. "I used a 7-day moving average to smooth daily revenue fluctuations and show the trend more clearly."</div>`

  ) AS cumulative,
  SUM(sales) OVER () AS grand_total,   -- entire table sum

  .withColumn("grand_total", sum_("sales").over(w_total)) \

function buildTabs(){
  const t=document.getElementById("tabs");
  data.forEach((s,i)=>{
    const b=document.createElement("button");
    b.className="tab"+(i===0?" active":"");
    b.textContent=s.label;
    b.onclick=()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      document.querySelectorAll(".sec").forEach(x=>x.classList.remove("active"));
      document.getElementById("s-"+s.id).classList.add("active");
    };
    t.appendChild(b);
  });
}
function buildSecs(){
  const c=document.getElementById("secs");
  data.forEach((s,i)=>{
    const sec=document.createElement("div");
    sec.className="sec"+(i===0?" active":"");
    sec.id="s-"+s.id;
    sec.innerHTML=`<div class="sec-title">${s.title}</div><div class="sec-sub">${s.sub}</div><div class="cards">${s.cards.map(buildCard).join("")}</div>`;
    c.appendChild(sec);
  });
}
function buildCard(p){
  return `<div class="card">
    <div class="card-head" onclick="toggle(this)">
      <span class="badge ${p.bc}">${p.badge}</span>
      <span class="card-title">${p.title}</span>
      <span class="chev">▼</span>
    </div>
    <div class="card-body">${p.body}</div>
  </div>`;
}
function toggle(h){
  const b=h.nextElementSibling,c=h.querySelector(".chev");
  b.classList.toggle("open");c.classList.toggle("open");
}
buildTabs();buildSecs();
</script>
