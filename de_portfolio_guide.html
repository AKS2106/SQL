<div class="lbl">transform.py — the main logic</div>
<div class="code">from pyspark.sql import SparkSession
from pyspark.sql.functions import *
from pyspark.sql.window import Window

def create_readmission_features(df):
    w = Window.partitionBy("patient_id").orderBy("admission_date")
    
    return df \
        .withColumn("prev_discharge", lag("discharge_date").over(w)) \
        .withColumn("days_between",
            datediff(col("admission_date"), col("prev_discharge"))) \
        .withColumn("is_readmission",
            when(col("days_between") <= 30, 1).otherwise(0)) \
        .withColumn("los_days",
            datediff(col("discharge_date"), col("admission_date"))) \
        .withColumn("risk_tier",
            when(col("los_days") > 14, "high")
            .when(col("los_days") > 7, "medium")
            .otherwise("low"))

def dept_summary(df):
    return df.groupBy("department").agg(
        count("*").alias("total_admissions"),
        sum("is_readmission").alias("readmissions"),
        avg("los_days").alias("avg_los"),
        round(100*sum("is_readmission")/count("*"),1).alias("readmit_rate_pct")
    ).orderBy(col("readmit_rate_pct").desc())</div>
<div class="lbl">quality.py — data validation</div>
<div class="code">def run_quality_checks(df):
    total = df.count()
    checks = {
        "null_patient_ids": df.filter(col("patient_id").isNull()).count(),
        "negative_los": df.filter(
            datediff(col("discharge_date"),col("admission_date")) < 0
        ).count(),
        "future_admissions": df.filter(
            col("admission_date") > current_date()
        ).count()
    }
    for check, count_ in checks.items():
        status = "PASS" if count_ == 0 else "FAIL"
        print(f"[{status}] {check}: {count_}/{total} rows affected")
    return checks</div>`

-- Q1: Departments above average readmission rate
WITH dept_rates AS (
  SELECT department,
    COUNT(*) AS admissions,
    ROUND(100.0*SUM(is_readmission)/COUNT(*),1) AS readmit_pct
  FROM admissions GROUP BY department
),
avg_rate AS (SELECT AVG(readmit_pct) AS avg_r FROM dept_rates)
SELECT d.*, ROUND(d.readmit_pct - a.avg_r,1) AS vs_avg
FROM dept_rates d, avg_rate a
WHERE d.readmit_pct > a.avg_r
ORDER BY vs_avg DESC;

-- Q2: Top 3 diagnoses by avg length of stay
SELECT diagnosis_code, diagnosis_desc,
  COUNT(*) AS cases,
  ROUND(AVG(los_days),1) AS avg_los,
  DENSE_RANK() OVER (ORDER BY AVG(los_days) DESC) AS los_rank
FROM admissions
GROUP BY diagnosis_code, diagnosis_desc
QUALIFY los_rank <= 3;</div>

from awsglue.transforms import *

from pyspark.context import SparkContext
from awsglue.context import GlueContext
from awsglue.job import Job
from pyspark.sql.functions import *
from pyspark.sql.window import Window

args = getResolvedOptions(sys.argv, ['JOB_NAME'])
sc = SparkContext()
glueContext = GlueContext(sc)

<div class="code">import json, time, random
from kafka import KafkaProducer
from datetime import datetime

producer = KafkaProducer(
    bootstrap_servers='localhost:9092',
    value_serializer=lambda v: json.dumps(v).encode('utf-8')
)

VEHICLES = [f"VH{str(i).zfill(4)}" for i in range(1, 101)]

def generate_reading(vehicle_id):
    is_anomaly = random.random() < 0.05  # 5% anomaly rate
    return {
        "vehicle_id": vehicle_id,
        "timestamp": datetime.utcnow().isoformat(),
        "engine_temp": round(random.gauss(105 if is_anomaly else 88, 5), 1),
        "rpm":         round(random.gauss(5200 if is_anomaly else 2800, 300)),
        "battery_v":   round(random.gauss(11.5 if is_anomaly else 13.8, 0.3), 2),
        "speed_kmh":   round(random.uniform(0, 120))
    }

print("Streaming sensor data to Kafka...")
while True:
    for vid in random.sample(VEHICLES, 10):
        producer.send("vehicle-sensors", generate_reading(vid))
    producer.flush()
    time.sleep(1)  # 10 events/second</div>`

<div class="lbl">consumer.py — reads from Kafka, detects anomalies</div>
<div class="code">from pyspark.sql import SparkSession
from pyspark.sql.functions import *
from pyspark.sql.types import *
from pyspark.sql.window import Window

spark = SparkSession.builder \
    .appName("VehicleAnomalyDetector") \
    .config("spark.jars.packages",
            "org.apache.spark:spark-sql-kafka-0-10_2.12:3.3.0") \
    .getOrCreate()

schema = StructType([
    StructField("vehicle_id", StringType()),
    StructField("timestamp", StringType()),
    StructField("engine_temp", FloatType()),
    StructField("rpm", IntegerType()),
    StructField("battery_v", FloatType()),
    StructField("speed_kmh", IntegerType())
])

raw = spark.readStream.format("kafka") \
    .option("kafka.bootstrap.servers","localhost:9092") \
    .option("subscribe","vehicle-sensors") \
    .load()

df = raw.select(
    from_json(col("value").cast("string"), schema).alias("data")
).select("data.*") \
 .withColumn("event_time", to_timestamp("timestamp"))

windowed = df \
    .withWatermark("event_time", "1 minute") \
    .groupBy(
        window("event_time", "2 minutes", "30 seconds"),
        "vehicle_id"
    ).agg(
        avg("engine_temp").alias("avg_temp"),
        max("rpm").alias("max_rpm"),
        min("battery_v").alias("min_battery"),
        count("*").alias("readings")
    )

alerts = windowed.filter(
    (col("avg_temp") > 100) |
    (col("max_rpm") > 5000) |
    (col("min_battery") < 12.0)
).withColumn("alert_reason",
    when(col("avg_temp") > 100, "HIGH_TEMP")
    .when(col("max_rpm") > 5000, "HIGH_RPM")
    .otherwise("LOW_BATTERY")
)

query = alerts.writeStream \
    .outputMode("update") \
    .format("console") \
    .option("truncate", False) \
    .start()

query.awaitTermination()</div>
<div class="insight">Windowing + watermarking in a real running project = one of the strongest things you can show in a DE interview. Very few candidates actually build this.</div>`

function buildTabs(){
  const t=document.getElementById("tabs");
  data.forEach((s,i)=>{
    const b=document.createElement("button");
    b.className="tab"+(i===0?" active":"");
    b.textContent=s.label;
    b.onclick=()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
      document.getElementById("s-"+s.id).classList.add("active");
    };
    t.appendChild(b);
  });
}

function buildSecs(){
  const c=document.getElementById("secs");
  data.forEach((s,i)=>{
    const sec=document.createElement("div");
    sec.className="section"+(i===0?" active":"");
    sec.id="s-"+s.id;
    sec.innerHTML=`<div class="sec-title">${s.title}</div><div class="sec-sub">${s.sub}</div><div class="cards">${s.cards.map(buildCard).join("")}</div>`;
    c.appendChild(sec);
  });
}

function buildCard(p){
  return `<div class="card">
    <div class="card-head" onclick="toggle(this)">
      <span class="badge ${p.bc}">${p.badge}</span>
      <span class="card-title">${p.title}</span>
      <span class="chev">▼</span>
    </div>
    <div class="card-body">${p.body}</div>
  </div>`;
}

function toggle(h){
  const b=h.nextElementSibling,c=h.querySelector(".chev");
  b.classList.toggle("open");c.classList.toggle("open");
}

buildTabs();buildSecs();
