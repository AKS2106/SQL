<div class="lbl">What it is</div>
<div class="para">When dimension data changes over time (customer address, product price), you need a strategy. Very common in data warehouse interviews.</div>
<div class="qa-q">SCD Type 1 — Overwrite</div>
<div class="qa-a">Just update the record. No history kept. Use when history doesn't matter (e.g., fixing a typo).</div>
<div class="qa-q">SCD Type 2 — Add new row (most common)</div>
<div class="qa-a">Insert a new row with new value. Mark old row as inactive. Add start_date and end_date. Use when you need full history (e.g., customer moved — which address was active during that order?).</div>
<div class="code">-- SCD Type 2 pattern
INSERT INTO customers (id, name, city, start_date, end_date, is_current)

      title:"Case: Patient readmission pipeline (hospital)", badge:"Batch Pipeline", bc:"b-blue",
      body:`
<div class="lbl">Business problem</div>
<div class="para">Hospital wants to predict which patients discharged today are likely to be readmitted within 30 days. CX angle: reducing readmissions improves patient experience and reduces costs.</div>
<div class="lbl">Pipeline architecture</div>
<div class="arch">
  <div class="arch-step">EHR System (HL7/FHIR)</div>
  <div class="arch-step">S3 raw (encrypted)</div>
  <div class="arch-step">AWS Glue + PySpark</div>
  <div class="arch-step">S3 curated (Parquet)</div>
  <div class="arch-step">Redshift + Athena</div>
  <div class="arch-step">ML model / Dashboard</div>
</div>
<div class="lbl">Key design decisions</div>
<div class="para">• S3 encryption at rest (SSE-KMS) — HIPAA requirement<br>• PII masking: hash patient_id before storing in analytics layer<br>• Partition by admission_date and hospital_id<br>• Data retention policy: 7 years (regulatory)<br>• VPC + private subnets — no public internet access to data</div>
<div class="lbl">PySpark — calculate readmission flag</div>
<div class="code">from pyspark.sql.functions import datediff, lag
from pyspark.sql.window import Window

w = Window.partitionBy("patient_id").orderBy("admission_date")

df = df.withColumn("prev_discharge", lag("discharge_date").over(w)) \
       .withColumn("days_since_last",
           datediff(col("admission_date"), col("prev_discharge"))) \
       .withColumn("is_readmission",
           when(col("days_since_last") <= 30, 1).otherwise(0))</div>
<div class="tip">Always mention HIPAA when designing health pipelines. It shows domain awareness. Key points: encryption, access control, audit logs, data masking.</div>`

      title:"Case: Insurance claims anomaly detection", badge:"Real-time", bc:"b-amber",

<div class="lbl">Business problem</div>
<div class="para">Insurance company processes 50k claims/day. Detect fraudulent or anomalous claims in real-time before approval.</div>
<div class="lbl">Architecture</div>
<div class="arch">
  <div class="arch-step">Claims API</div>
  <div class="arch-step">Kinesis Streams</div>
  <div class="arch-step">Spark Structured Streaming</div>
  <div class="arch-step">DynamoDB (flags)</div>
  <div class="arch-step">SNS → Analyst Alert</div>
</div>
<div class="lbl">Anomaly logic in PySpark</div>
<div class="code">w = Window.partitionBy("provider_id") \
          .orderBy("claim_date") \
          .rowsBetween(-6, 0)  # 7-day sliding window

df = df.withColumn("avg_claim_7d", avg("amount").over(w)) \
       .withColumn("is_anomaly",
           when(col("amount") > col("avg_claim_7d") * 3, True)
           .otherwise(False))</div>
<div class="lbl">SQL for analysts to investigate</div>
<div class="code">-- Top providers by anomaly rate
SELECT provider_id, 
       COUNT(*) AS total_claims,
       SUM(is_anomaly) AS flagged,
       ROUND(100.0 * SUM(is_anomaly)/COUNT(*), 1) AS flag_rate_pct
FROM claims
WHERE claim_date >= CURRENT_DATE - 30
GROUP BY provider_id
HAVING flag_rate_pct > 10
ORDER BY flag_rate_pct DESC;</div>
<div class="insight">Tie this to your CX experience: "In customer experience, we saw patterns of fraudulent refund requests — the same anomaly detection logic applies at scale here."</div>`

      title:"SQL — clinical data questions", badge:"SQL", bc:"b-green",

<div class="lbl">Q1: Find patients with more than 2 hospital visits in the last 90 days</div>
<div class="code">SELECT patient_id, COUNT(*) AS visits
FROM admissions
WHERE admission_date >= CURRENT_DATE - 90
GROUP BY patient_id
HAVING COUNT(*) > 2
ORDER BY visits DESC;</div>
<div class="lbl">Q2: Average length of stay per diagnosis, only for stays > 2 days</div>
<div class="code">SELECT diagnosis_code,
       AVG(DATEDIFF(discharge_date, admission_date)) AS avg_los_days,
       COUNT(*) AS cases
FROM admissions
WHERE DATEDIFF(discharge_date, admission_date) > 2
GROUP BY diagnosis_code
ORDER BY avg_los_days DESC;</div>
<div class="lbl">Q3: Month-over-month change in claims volume</div>
<div class="code">WITH monthly AS (
  SELECT DATE_FORMAT(claim_date,'%Y-%m') AS month,
         COUNT(*) AS claims
  FROM claims GROUP BY 1
)
SELECT month, claims,
  LAG(claims) OVER (ORDER BY month) AS prev_month,
  ROUND(100.0*(claims - LAG(claims) OVER (ORDER BY month))
        / LAG(claims) OVER (ORDER BY month), 1) AS pct_change
FROM monthly;</div>`
    }

      title:"Case: Supply chain delay detection", badge:"Batch", bc:"b-green",
      body:`
<div class="lbl">Business problem</div>
<div class="para">Auto manufacturer has 2000+ suppliers. Identify which suppliers consistently deliver late and impact production schedules.</div>
<div class="lbl">SQL — supplier performance analysis</div>
<div class="code">WITH supplier_stats AS (
  SELECT supplier_id,
    COUNT(*) AS total_deliveries,
    SUM(CASE WHEN actual_date > expected_date THEN 1 ELSE 0 END) AS late_count,
    AVG(DATEDIFF(actual_date, expected_date)) AS avg_delay_days,
    ROUND(100.0 * SUM(CASE WHEN actual_date > expected_date THEN 1 ELSE 0 END)
          / COUNT(*), 1) AS late_rate_pct
  FROM deliveries
  WHERE delivery_date >= CURRENT_DATE - 90
  GROUP BY supplier_id
),
ranked AS (
  SELECT *, 
    DENSE_RANK() OVER (ORDER BY late_rate_pct DESC) AS risk_rank
  FROM supplier_stats
)
SELECT supplier_id, total_deliveries, late_rate_pct, 
       avg_delay_days, risk_rank,
  CASE WHEN late_rate_pct > 30 THEN 'High Risk'
       WHEN late_rate_pct > 15 THEN 'Medium Risk'
       ELSE 'Low Risk' END AS risk_category
FROM ranked
WHERE risk_rank <= 20;</div>
<div class="tip">This query combines CTEs + window functions + CASE — exactly what interviewers test. Practice explaining it line by line.</div>`

<div class="code">from pyspark.sql.functions import percentile_approx

# Get 5th and 95th percentile bounds to remove outliers

  percentile_approx("fuel_efficiency", 0.05).alias("low"),
  percentile_approx("fuel_efficiency", 0.95).alias("high")
).collect()[0]

    (col("fuel_efficiency") >= bounds["low"]) & 
    (col("fuel_efficiency") <= bounds["high"])
).groupBy("brand").agg(avg("fuel_efficiency").alias("avg_mpg")) \
 .orderBy(col("avg_mpg").desc())</div>`

function buildTabs(){
  const t=document.getElementById("tabs");
  data.forEach((s,i)=>{
    const b=document.createElement("button");
    b.className="tab"+(i===0?" active":"");
    b.textContent=s.label;
    b.onclick=()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
      document.getElementById("s-"+s.id).classList.add("active");
    };
    t.appendChild(b);
  });
}

function buildSecs(){
  const c=document.getElementById("secs");
  data.forEach((s,i)=>{
    const sec=document.createElement("div");
    sec.className="section"+(i===0?" active":"");
    sec.id="s-"+s.id;
    sec.innerHTML=`<div class="sec-title">${s.title}</div><div class="sec-sub">${s.sub}</div><div class="cards">${s.cards.map(buildCard).join("")}</div>`;
    c.appendChild(sec);
  });
}

function buildCard(p){
  return `<div class="card">
    <div class="card-head" onclick="toggle(this)">
      <span class="badge ${p.bc}">${p.badge}</span>
      <span class="card-title">${p.title}</span>
      <span class="chev">▼</span>
    </div>
    <div class="card-body">${p.body}</div>
  </div>`;
}

function toggle(h){
  const b=h.nextElementSibling,c=h.querySelector(".chev");
  b.classList.toggle("open");c.classList.toggle("open");
}

buildTabs();buildSecs();
